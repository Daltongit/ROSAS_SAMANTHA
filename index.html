<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Árbol de Rosas Rosadas 🌸</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <!-- Fondo decorativo de rosas en los bordes -->
    <div class="border-flowers top"></div>
    <div class="border-flowers bottom"></div>

    <!-- Contenedor principal de la animación -->
    <div class="scene-wrapper">
        <canvas id="flowerCanvas"></canvas>

        <!-- Mensaje romántico con efecto typewriter -->
        <div class="message-box" id="messageBox">
            <p class="message-title" id="messageTitle"></p>
            <p class="message-body" id="messageBody"></p>
        </div>

        <!-- Cronómetro del amor -->
        <div class="timer-box">
            <span class="timer-label">Mi amor por ti comenzó hace...</span>
            <span class="timer-display" id="timerDisplay">0 días 0 horas 0 minutos 0 segundos</span>
        </div>
    </div>

    <script src="js/flowers.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
